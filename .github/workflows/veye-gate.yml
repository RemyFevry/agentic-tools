name: veye-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  statuses: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Install Veye
        run: |
          # Until veye is published to npm, install it from the parent monorepo.
          # Once veye is on npm, replace this with: npm install -g veye
          git clone --depth 1 https://github.com/RemyFevry/fil /tmp/veye
          cd /tmp/veye
          bun install
          bun run build
          echo "/tmp/veye/dist/binaries" >> $GITHUB_PATH
      - name: Run freshness gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          veye gate \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --repo-root .
