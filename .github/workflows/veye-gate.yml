name: veye-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  statuses: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Install Veye
        id: install
        env:
          VEYE_VERSION: '0.1.0'
        run: |
          # Try to install veye from npm first. If that fails (not yet
          # published), build from source. Once veye is on npm, the
          # source-build fallback can be removed.
          if npm install -g "veye@${VEYE_VERSION}" 2>/dev/null; then
            echo "veye installed from npm"
            echo "veye_available=true" >> $GITHUB_OUTPUT
          else
            git clone --depth 1 https://github.com/RemyFevry/veye /tmp/veye
            cd /tmp/veye
            bun install
            mkdir -p dist/binaries
            bun build --compile packages/cli/src/cli.ts --outfile dist/binaries/veye
            echo "/tmp/veye/dist/binaries" >> $GITHUB_PATH
            echo "veye_available=true" >> $GITHUB_OUTPUT
          fi
      - name: Run freshness gate
        if: steps.install.outputs.veye_available == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          veye gate \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --repo-root .