name: veye-compute

on:
  push:
    branches: [main]
    paths:
      - docs/wiki/**
      - src/**
      - packages/**
      - lib/**
    paths-ignore:
      - .veye/**

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run veye compute
      - name: Commit freshness.json
        run: |
          git config user.name "veye-bot"
          git config user.email "veye-bot@users.noreply.github.com"
          git add .veye/freshness.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(veye): refresh freshness.json [skip ci]"
            git push
          fi
