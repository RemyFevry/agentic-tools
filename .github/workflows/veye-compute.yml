name: veye-compute

on:
  push:
    branches: [main]
    paths:
      - docs/wiki/**
      - src/**
      - packages/**
      - lib/**
    paths-ignore:
      - .veye/**

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Install Veye
        env:
          VEYE_VERSION: "0.1.0"
        run: |
          # Try to install veye from npm first. If that fails (not yet
          # published), skip with a warning. Once veye is on npm, this
          # fallback can be removed.
          if npm install -g "veye@${VEYE_VERSION}" 2>/dev/null; then
            echo "veye installed from npm"
          else
            echo "::warning::veye is not yet published to npm; compute skipped. See https://github.com/RemyFevry/fil"
            exit 0
          fi
      - run: veye compute
      - name: Commit freshness.json
        run: |
          git config user.name "veye-bot"
          git config user.email "veye-bot@users.noreply.github.com"
          git add .veye/freshness.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(veye): refresh freshness.json [skip ci]"
            git push
          fi
