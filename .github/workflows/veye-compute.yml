name: veye-compute

on:
  push:
    branches: [main]
    paths:
      - docs/wiki/**
      - src/**
      - packages/**
      - lib/**
    paths-ignore:
      - .veye/**

permissions:
  contents: write

jobs:
  compute:
    # continue-on-error: the gate will fail until Veye is published to npm.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Install Veye
        run: |
          # Until veye is published to npm, install it from the parent monorepo.
          # Once veye is on npm, replace this with: npm install -g veye
          git clone --depth 1 https://github.com/RemyFevry/fil /tmp/veye
          cd /tmp/veye
          bun install
          mkdir -p dist/binaries
          bun build --compile packages/cli/src/cli.ts --outfile dist/binaries/veye
          echo "/tmp/veye/dist/binaries" >> $GITHUB_PATH
      - run: veye compute
      - name: Commit freshness.json
        run: |
          git config user.name "veye-bot"
          git config user.email "veye-bot@users.noreply.github.com"
          git add .veye/freshness.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(veye): refresh freshness.json [skip ci]"
            git push
          fi
